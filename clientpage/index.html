<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twistyface</title>
    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- External Libraries -->
    <script src="lib/tfjs.min.js"></script>
    <script src="lib/mediapipe/hands/hands.js"></script>
    <script src="lib/mediapipe-hands-wrapper.js"></script>
    <script src="lib/hand-pose-detection.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.9.11/build/Tone.js"></script>
    <!-- External JavaScript -->
    <script type="module" src="js/webglContext.js"></script>
    <script type="module" src="js/handTracking.js"></script>
    <script type="module" src="js/handTracker.js"></script>
    <script type="module" src="js/gridManager.js"></script>
    <script type="module" src="js/videoProcessor.js"></script>
    <script type="module" src="js/main.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
        }

        .container {
            position: relative;
            width: 50%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video,
        canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
        }

        /* Contain mode styles */
        .contain-mode video,
        .contain-mode canvas {
            width: 100%;
            height: 100%;
            min-width: auto;
            min-height: auto;
            object-fit: contain;
        }

        .overlay {
            pointer-events: none;
        }

        .grid-overlay {
            z-index: 1;
        }

        .hand-overlay {
            z-index: 2;
        }

        #video {
            transform: translate(-50%, -50%) scaleX(-1);
        }

        #shaderOverlayCanvas {
            transform: translate(-50%, -50%) scaleX(-1);
        }

        /* Mode indicator */
        .mode-indicator {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mode-indicator.visible {
            opacity: 1;
        }

        /* Setup screen */
        #setupScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: Arial, sans-serif;
            color: #fff;
            gap: 32px;
        }

        #setupScreen h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 0;
        }

        #setupScreen p.subtitle {
            color: #888;
            margin: 0;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        .setup-options {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        #dropZone {
            border: 1px solid #444;
            padding: 32px 40px;
            cursor: pointer;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            transition: border-color 0.2s, color 0.2s;
            min-width: 160px;
        }

        #dropZone:hover,
        #dropZone.drag-over {
            border-color: #fff;
            color: #fff;
        }

        #dropZone span {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .divider {
            color: #444;
            align-self: center;
            font-size: 0.8rem;
        }

        .record-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 160px;
        }

        .btn {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background 0.2s, color 0.2s;
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            background: #fff;
            color: #000;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .btn.stop {
            border-color: #c00;
            color: #c00;
        }

        .btn.stop:hover {
            background: #c00;
            color: #fff;
        }

        #recordTimer {
            font-size: 1.2rem;
            font-variant-numeric: tabular-nums;
            min-height: 1.5rem;
        }

        #statusMsg {
            color: #888;
            font-size: 0.8rem;
            min-height: 1.2rem;
            letter-spacing: 0.05em;
        }

        #startBtn {
            font-size: 1rem;
            padding: 14px 48px;
            letter-spacing: 0.2em;
        }

        /* Debug overlay */
        #debugOverlay {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vh;
            transform: translate(-50%, -50%);
            background: transparent;
            border: none;
            z-index: 9000;
            pointer-events: none;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
            padding: 12px 16px;
        }

        #debugOverlay h2 {
            margin: 0;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <!-- Setup screen: shown until user loads a sample and clicks Start -->
    <div id="setupScreen">
        <h1>Twistyface</h1>
        <p class="subtitle">Load a sample to begin</p>
        <div class="setup-options">
            <div class="record-area">
                <button class="btn" id="recordBtn">Record audio</button>
                <button class="btn stop" id="stopBtn" style="display:none;">Stop</button>
                <div id="recordTimer"></div>
            </div>
            <div class="divider">or</div>
            <div id="dropZone">
                <span>&#8681;</span>
                Drop an audio file<br>or click to browse
                <input type="file" id="fileInput" accept="audio/*" style="display:none;">
            </div>
        </div>
        <div id="statusMsg"></div>
        <button class="btn" id="startBtn" disabled>Start</button>
    </div>

    <div id="videoContainer" class="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="gridCanvas" class="overlay grid-overlay"></canvas>
        <canvas id="handCanvas" class="overlay hand-overlay"></canvas>
    </div>
    <div id="shaderContainer" class="container">
        <canvas id="canvas"></canvas>
        <canvas id="shaderOverlayCanvas" class="overlay"></canvas>
        <canvas id="rightHandCanvas" class="overlay hand-overlay"></canvas>
    </div>
    <div id="debugOverlay">
    </div>
    <div id="modeIndicator" class="mode-indicator">Cover Mode</div>

    <script>
        function alignDebugOverlayToGrid() {
            const debugOverlay = document.getElementById('debugOverlay');
            const gridCanvas = document.getElementById('gridCanvas');
            const shaderOverlayCanvas = document.getElementById('shaderOverlayCanvas');
            if (!debugOverlay || !gridCanvas || !shaderOverlayCanvas) return;

            // Align to whichever overlay is currently visible.
            const gridRect = gridCanvas.getBoundingClientRect();
            const shaderRect = shaderOverlayCanvas.getBoundingClientRect();
            const activeCanvas = gridRect.width > 0 && gridRect.height > 0 ? gridCanvas : shaderOverlayCanvas;
            const activeRect = activeCanvas.getBoundingClientRect();

            // Keep this in sync with GridManager defaults.
            const gridSize = 4;
            const outerPadding = 100;
            const padding = 1;

            const canvasWidth = activeCanvas.width;
            const canvasHeight = activeCanvas.height;
            if (!canvasWidth || !canvasHeight) return;

            const availableWidth = canvasWidth - (outerPadding * 2);
            const availableHeight = canvasHeight - (outerPadding * 2);
            const totalPadding = padding * (gridSize + 1);

            const squareSize = Math.min(
                (availableWidth - totalPadding) / gridSize,
                (availableHeight - totalPadding) / gridSize
            );

            const totalGridWidth = (squareSize * gridSize) + (padding * (gridSize - 1));
            const totalGridHeight = (squareSize * gridSize) + (padding * (gridSize - 1));

            // Canvas drawing coordinates are in intrinsic pixels; convert to CSS pixels.
            const scaleX = activeRect.width / canvasWidth;
            const scaleY = activeRect.height / canvasHeight;
            const gridWidthPx = totalGridWidth * scaleX;
            const gridHeightPx = totalGridHeight * scaleY;
            const gridX = outerPadding + ((availableWidth - totalGridWidth) / 2) + padding;
            const gridY = outerPadding + ((availableHeight - totalGridHeight) / 2) + padding;

            debugOverlay.style.left = `${activeRect.left + (gridX * scaleX)}px`;
            debugOverlay.style.top = `${activeRect.top + (gridY * scaleY)}px`;
            debugOverlay.style.width = `${gridWidthPx}px`;
            debugOverlay.style.height = `${gridHeightPx}px`;
            debugOverlay.style.transform = 'none';
        }

        window.addEventListener('load', () => {
            alignDebugOverlayToGrid();
            setTimeout(alignDebugOverlayToGrid, 250);
            setTimeout(alignDebugOverlayToGrid, 1000);
        });
        window.addEventListener('resize', alignDebugOverlayToGrid);
        setInterval(alignDebugOverlayToGrid, 250);

        document.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'v') {
                const videoContainer = document.getElementById('videoContainer');
                const shaderContainer = document.getElementById('shaderContainer');
                const modeIndicator = document.getElementById('modeIndicator');

                videoContainer.classList.toggle('contain-mode');
                shaderContainer.classList.toggle('contain-mode');

                const isContainMode = videoContainer.classList.contains('contain-mode');
                modeIndicator.textContent = isContainMode ? 'Contain Mode' : 'Cover Mode';
                modeIndicator.classList.add('visible');

                setTimeout(alignDebugOverlayToGrid, 0);

                setTimeout(() => {
                    modeIndicator.classList.remove('visible');
                }, 2000);
            } else if (event.key.toLowerCase() === 'd') {
                const debugOverlay = document.getElementById('debugOverlay');
                if (debugOverlay) {
                    const isHidden = debugOverlay.style.display === 'none';
                    debugOverlay.style.display = isHidden ? 'flex' : 'none';
                }
            }
        });
    </script>
</body>

</html>
